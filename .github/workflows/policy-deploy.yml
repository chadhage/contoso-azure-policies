name: policy-deploy

# Deploys the Contoso WAF policy baseline when policy artifacts are merged to main.
on:
  push:
    branches: [ main ]
    paths:
      - 'policy/**'
      - 'management-groups/**'
      - 'scripts/**'
      - '.github/workflows/policy-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: policy-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy policy baseline
    runs-on: ubuntu-latest
    environment: production
    # Skips gracefully until OIDC federation is configured for the deployment identity.
    if: ${{ vars.AZURE_CLIENT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy definitions, initiatives, and assignments
        shell: bash
        run: |
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh --mg "${{ vars.ROOT_MANAGEMENT_GROUP_ID }}" --location "${{ vars.LOCATION }}"

      - name: Trigger compliance scan
        shell: bash
        run: az policy state trigger-scan --management-group "${{ vars.ROOT_MANAGEMENT_GROUP_ID }}" --no-wait
